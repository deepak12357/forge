services:

  postgres:
    image: postgres:16
    container_name: forge-postgres

    environment:
      POSTGRES_DB: forge
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: forge

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: forge-redis

    ports:
      - "6379:6379"

volumes:
  postgres_data: