name: Build

on:
  pull_request:
  push:
    branches:
      -main

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Make Maven Wrapper Executable
        run: chmod +x mvnw

      - name: Verify
        run: ./mvnw -B spotless:check verify